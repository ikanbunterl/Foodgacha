<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Gacha!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="live-bg-layer">
        <video id="liveBgVideo" class="live-bg-video" loop muted playsinline></video>
    </div>

    <header class="app-header">
        <div class="logo">FOOD GACHA!</div>
        <div class="header-center">
            <div class="currency-badge">🍽️ <span id="plateCount">0</span></div>
            <div class="currency-badge gem">💎 <span id="gemCount">0</span></div>
        </div>
        <div class="header-right">
            <div class="buff-indicator" id="buffIndicator">⏳ No Buffs</div>
            <div class="profile-avatar">👤</div>
        </div>
    </header>

    <main class="app-main">
        <!-- Home View -->
        <section id="homeView" class="view active">
            <div class="gacha-section">
                <div class="gacha-display" id="spinDisplay">
                    <div class="question-mark">?</div>
                </div>
                <div style="font-size: 0.4em; color: #FFF; text-shadow: 1px 1px 0 #000; margin-top: -10px;">
                    Pity: <span id="pityCount">0</span>/100
                </div>
                <div style="width: 80%; max-width: 280px; height: 8px; background: rgba(255,255,255,0.2); border: 2px solid #000; border-radius: 4px; margin-top: 5px; overflow: hidden;">
                    <div id="pityBar" style="height: 100%; width: 0%; background: var(--primary); transition: width 0.3s;"></div>
                </div>
                <div class="gacha-controls">
                    <button id="spinBtn" class="btn btn-spin">🎲 PULL (1 🍽️)</button>
                    <button id="multiSpinBtn" class="btn btn-spin" style="background: linear-gradient(180deg, #B8860B 0%, #DAA520 100%);">🎲 10x PULL (9 🍽️)</button>
                    <button id="freeSpinBtn" class="btn btn-free">FREE (0)</button>
                </div>
            </div>
        </section>

        <!-- Inventory View -->
        <section id="inventoryView" class="view">
            <div class="section-header">
                <h3>📦 My Collection</h3>
                <div class="filter-tabs">
                    <button class="tab-btn active" data-filter="all">All</button>
                    <button class="tab-btn" data-filter="common">Common</button>
                    <button class="tab-btn" data-filter="rare">Rare</button>
                    <button class="tab-btn" data-filter="epic">Epic</button>
                    <button class="tab-btn" data-filter="legendary">Legendary</button>
                </div>
            </div>
            <div class="grid-container" id="collectionGrid"></div>
        </section>

        <!-- Shop View -->
        <section id="shopView" class="view">
            <div class="section-header">
                <h3>🛒 Background Shop</h3>
            </div>
            <div class="grid-container" id="shopGrid"></div>
            
            <div class="section-header" style="margin-top: 20px;">
                <h3>✨ Upgrades & Charms (Pakai 💎)</h3>
            </div>
            <div id="upgradeGrid"></div>
        </section>

        <!-- Settings View -->
        <section id="settingsView" class="view">
            <div class="section-header"><h3>⚙️ Settings</h3></div>
            <div class="settings-group">
                <label>🔊 Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.8">
            </div>
            <div class="settings-group">
                <label>🌙 Dark Mode</label>
                <button id="darkModeToggle" class="toggle-btn">OFF</button>
            </div>
            <div class="settings-group">
                <label>🔋 Power Saving</label>
                <button id="powerSavingToggle" class="toggle-btn">OFF</button>
            </div>
            
            <div class="section-header" style="margin-top: 20px;"><h3>👨‍💻 Credits</h3></div>
            <div class="settings-group">
                <div id="creatorList" class="credits-list"></div>
            </div>

            <div class="section-header" style="margin-top: 20px;"><h3>📝 Update Log</h3></div>
            <div class="settings-group">
                <div id="updateLogList" class="update-log"></div>
            </div>
        </section>
    </main>

    <nav class="app-nav">
        <button class="nav-btn active" data-view="homeView">🏠<br>Home</button>
        <button class="nav-btn" data-view="inventoryView">🎒<br>Inv</button>
        <button class="nav-btn" data-view="shopView">🛒<br>Shop</button>
        <button class="nav-btn" data-view="settingsView">⚙️<br>Set</button>
    </nav>

    <!-- Modals -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">✕</button>
            <div class="modal-image" id="modalImage"></div>
            <h2 class="modal-title" id="modalTitle">Nama Item</h2>
            <div class="modal-rarity" id="modalRarity">RARITY</div>
            <p class="modal-desc" id="modalDesc">Deskripsi...</p>
            <div class="modal-actions">
                <button id="consumeBtn" class="action-btn consume-btn">MAKAN</button>
                <button id="keepBtn" class="action-btn keep-btn">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="multiModal" class="modal">
        <div class="modal-content" style="max-width: 90%;">
            <h2 class="modal-title">🎉 10x Pull Results!</h2>
            <div class="multi-modal-grid" id="multiModalGrid"></div>
            <button id="closeMultiModal" class="action-btn" style="background: var(--primary); color: white; margin-top: 20px;">OK</button>
        </div>
    </div>

    <audio id="bgm" loop><source src="assets/audio/bgm.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-spin"><source src="assets/audio/spin.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-win"><source src="assets/audio/win.mp3" type="audio/mpeg"></audio>

    <script src="script.js"></script>
</body>
</html>
